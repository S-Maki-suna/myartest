<!DOCTYPE html>
<html>
<body>
<video id="video" autoplay playsinline style="width:100%"></video>

<script>
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById('video').srcObject = stream;
})
.catch(err => {
  alert("カメラエラー: " + err.message);
});
</script>
</body>
</html>
