<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <!-- A-Frame（固定） -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- AR.js（安定版） -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">
    <a-scene embedded vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;"
        arjs="sourceType: webcam; debugUIEnabled: true;">

        <a-marker preset="hiro">
            <a-text value="HELLO WORLD" position="0 0.1 0" rotation="-90 0 0" align="center" color="yellow" width="2">
            </a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
